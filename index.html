<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fihter</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

</head>
<body>
    <div id="hacking"></div>
    <div id="ui-container">
        <div id="p1-hud" class="hud">
            <h2>Player 1 (Blue)</h2>
            <div id="p1-lives" class="lives">❤❤❤❤❤</div>
            <div class="charge-bar-container"><div id="p1-charge" class="charge-bar"></div></div>
            Chosen arrow: <div id="p1-chosen-arrow" class="chosen-arrow">default</div>
        </div>
        <div id="game-status">BATTLE!</div>
        <div id="p2-hud" class="hud">
            <h2>Player 2 (Red)</h2>
            <div id="p2-lives" class="lives">❤❤❤❤❤</div>
            <div class="charge-bar-container"><div id="p2-charge" class="charge-bar"></div></div>
            Chosen arrow: <div id="p2-chosen-arrow" class="chosen-arrow">default</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1024" height="576"></canvas>

    <div id="controls-guide">
        <div><strong>Player 1:</strong> A/D = Move | W = Jump | S = Down | 1-2 = Chose Arrow | K = Sword | O = Hold/Release Bow</div>
    </div>
    
    <div id="menu">
        <div class="menu-config" style="margin-bottom: 15px; color: white; font-family: sans-serif;">
            <label for="lives-picker">Starting Lives: </label>
            <input type="number" id="lives-picker" value="5" min="1" max="10" style="width: 50px; padding: 5px; border-radius: 4px; border: none; text-align: center;">
        </div>
        
        <input type="text" id="room-code-input" placeholder="Enter Room Code (e.g. room-101)">
        <button id="btn-auto-restart" onclick="autorestart()">Auto Restart</button>
        <button id="btn-bot" onclick="startBotGame()">Play vs Bot</button>
        <button id="btn-multi" onclick="startMultiplayerGame(false)">Search Match</button>
        <button id="btn-multi" onclick="startMultiplayerGame(true)">Host Game</button>
        <button id="random-level" onclick="chooseRandomLevel()">New level</button>
        <div id="multiplayer-status"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
